name: Integration Test Packagist Download

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Menjalankan tes otomatis setiap hari jam 12 malam

jobs:
  download-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Initialize Dummy Project
        run: composer init --name="test/app" --require="warnadi/db-stressmit:^0.1.0" -n

      - name: Install Package from Packagist
        run: composer install --no-interaction --prefer-dist

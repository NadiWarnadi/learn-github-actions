name: Tarik Data Saham Harian

on:
  schedule:
    # Berjalan setiap Senin - Jumat jam 10:15 UTC (17:15 WIB)
    - cron: '15 10 * * 1-5'
  workflow_dispatch: # Tombol manual jika ingin menjalankan kapan saja

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write  

    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4

    - name: Pengaturan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Tentukan versi python agar cache berjalan optimal
        cache: 'pip'          # Perbaikan sintaks cache untuk setup-python@v5

    - name: Instal Pustaka
      run: |
        pip install yfinance pandas

    - name: Jalankan Skrip Penarik Data
      run: python ambil_saham.py

    - name: Commit dan Push Data ke Github
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Wajib ditambahkan untuk hak akses push
      run: |
        git config --global user.name "NadiWarnadi"
        git config --global user.email "warnadi2006@gmail.com"
        
        # Tambahkan semua perubahan di folder data_saham (termasuk file baru)
        git add data_saham/
        
        # Hanya commit jika ada perubahan agar workflow tidak error
        if ! git diff --cached --quiet; then
          git commit -m "Update data saham BBRI per menit - $(date +'%Y-%m-%d')"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "Tidak ada perubahan data untuk dikesampingkan."
        fi
